<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>我说吃啥就吃啥 V2.1</title>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ============ CSS Variables & Reset ============ */
:root {
  --wood-dark: #5c3d2e;
  --wood-mid: #8b6914;
  --wood-light: #a0845c;
  --paper: #f5e6c8;
  --paper-dark: #e8d5a3;
  --paper-light: #faf3e3;
  --ink: #4a3728;
  --ink-light: #6b5a4a;
  --accent: #c0392b;
  --accent-gold: #d4a017;
  --shadow: rgba(0,0,0,0.15);
  --radius: 12px;
  --font-hand: 'ZCOOL KuaiLe', cursive;
  --font-body: 'Noto Serif SC', serif;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: var(--font-body);
  background: linear-gradient(135deg, #3e2517 0%, #5c3d2e 30%, #4a3020 60%, #3e2517 100%);
  background-attachment: fixed;
  min-height: 100vh;
  color: var(--ink);
  overflow-x: hidden;
  position: relative;
}

body::before {
  content: '';
  position: fixed; top:0; left:0; right:0; bottom:0;
  background:
    repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(255,255,255,0.03) 2px, rgba(255,255,255,0.03) 4px),
    repeating-linear-gradient(0deg, transparent, transparent 30px, rgba(0,0,0,0.05) 30px, rgba(0,0,0,0.05) 31px);
  pointer-events: none;
  z-index: 0;
}

/* ============ Floating Texts ============ */
.floating-text {
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  font-family: var(--font-hand);
  font-size: 1rem;
  color: var(--paper-light);
  opacity: 0;
  animation: floatAcross 6s linear forwards;
  white-space: nowrap;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
}

@keyframes floatAcross {
  0% { opacity:0; transform: translateX(-100%) translateY(0) rotate(-5deg); }
  10% { opacity:0.5; }
  80% { opacity:0.5; }
  100% { opacity:0; transform: translateX(110vw) translateY(-40px) rotate(5deg); }
}

/* ============ Main Container ============ */
.main-container {
  position: relative; z-index: 1; max-width: 480px; margin: 0 auto;
  min-height: 100vh;
  background: linear-gradient(180deg, var(--paper) 0%, var(--paper-dark) 100%);
  box-shadow: 0 0 60px rgba(0,0,0,0.4), inset 0 0 30px rgba(139,105,20,0.1);
  border-left: 3px solid var(--wood-dark); border-right: 3px solid var(--wood-dark);
  overflow: hidden;
}
.book-spine {
  position: absolute; left: -8px; top: 0; bottom: 0; width: 8px;
  background: linear-gradient(90deg, #2a1a0e, var(--wood-dark), #2a1a0e);
  border-radius: 4px 0 0 4px;
}

/* ============ Pages ============ */
.page { display: none; padding: 20px 16px 40px; min-height: 100vh; animation: pageIn 0.4s ease-out; }
.page.active { display: block; }
@keyframes pageIn { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }

/* ============ Top Bar ============ */
.top-bar {
  display: flex; justify-content: space-around; align-items: center; flex-wrap: wrap;
  gap: 6px; padding: 10px 4px; border-bottom: 2px dashed var(--paper-dark); margin-bottom: 16px;
}
.top-btn {
  background: var(--wood-dark); color: var(--paper-light); border: none;
  padding: 8px 12px; border-radius: 20px; font-family: var(--font-hand);
  font-size: 0.85rem; cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.top-btn:active { transform: scale(0.95); }
.top-btn.music-on { background: var(--accent-gold); color: #fff; }

/* ============ Title Area ============ */
.title-area { text-align: center; padding: 24px 0 16px; }
.title-area h1 {
  font-family: var(--font-hand); font-size: 2rem; color: var(--ink);
  text-shadow: 2px 2px 0 var(--paper-dark); user-select: none; cursor: default; line-height: 1.4;
}
.title-area .subtitle { font-family: var(--font-hand); font-size: 1rem; color: var(--ink-light); margin-top: 6px; }

/* ============ Category Grid ============ */
.category-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; padding: 8px 0 20px; }
.cat-card {
  background: linear-gradient(135deg, var(--paper-light), var(--paper));
  border: 2px solid var(--paper-dark); border-radius: var(--radius);
  padding: 20px 14px; text-align: center; cursor: pointer; transition: all 0.3s;
  position: relative; overflow: hidden; box-shadow: 0 3px 10px var(--shadow);
}
.cat-card::after {
  content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
  background: radial-gradient(circle, rgba(212,160,23,0.15) 0%, transparent 70%);
  opacity: 0; transition: opacity 0.3s;
}
.cat-card:hover::after, .cat-card:active::after { opacity: 1; }
.cat-card:active { transform: scale(0.96); }
.cat-card .cat-icon { font-size: 2.8rem; display: block; margin-bottom: 8px; animation: bounce 2s infinite; }
@keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
.cat-card .cat-name { font-family: var(--font-hand); font-size: 1rem; color: var(--ink); line-height: 1.5; }
.cat-card .cat-tag {
  display: inline-block; background: var(--accent-gold); color: #fff; font-size: 0.7rem;
  padding: 2px 8px; border-radius: 10px; margin-top: 6px; font-family: var(--font-hand);
}

/* ============ Today Records ============ */
.today-records {
  background: var(--paper-light); border-radius: var(--radius); padding: 16px; border: 1px dashed var(--wood-light);
}
.today-records h3 { font-family: var(--font-hand); font-size: 1.1rem; margin-bottom: 10px; color: var(--ink); }
.today-records .record-item {
  padding: 8px 0; border-bottom: 1px dotted var(--paper-dark); font-size: 0.9rem;
  display: flex; align-items: center; gap: 8px;
}
.today-records .record-item:last-child { border-bottom: none; }
.today-records .record-tag {
  background: var(--wood-light); color: #fff; padding: 2px 8px; border-radius: 10px;
  font-size: 0.7rem; font-family: var(--font-hand);
}
.no-records { text-align: center; color: var(--ink-light); font-size: 0.85rem; padding: 12px 0; }

/* ============ Back Button ============ */
.back-btn {
  display: inline-flex; align-items: center; gap: 4px; background: none;
  border: 2px solid var(--wood-dark); color: var(--wood-dark); padding: 8px 16px;
  border-radius: 20px; font-family: var(--font-hand); font-size: 1rem; cursor: pointer;
  margin-bottom: 16px; transition: all 0.2s;
}
.back-btn:active { background: var(--wood-dark); color: var(--paper-light); }

/* ============ Lottery Page Common ============ */
.lottery-header { text-align: center; margin-bottom: 20px; }
.lottery-header h2 { font-family: var(--font-hand); font-size: 1.5rem; color: var(--ink); }
.lottery-header .lottery-icon { font-size: 3rem; display: block; margin-bottom: 8px; }
.lottery-area {
  background: var(--paper-light); border-radius: var(--radius); padding: 20px;
  min-height: 300px; display: flex; flex-direction: column; align-items: center;
  justify-content: center; border: 2px solid var(--paper-dark); position: relative; overflow: hidden;
}
.lottery-start-btn {
  padding: 16px 48px; background: var(--accent); color: #fff; border: none;
  border-radius: 30px; font-family: var(--font-hand); font-size: 1.3rem; cursor: pointer;
  transition: all 0.2s; box-shadow: 0 6px 20px rgba(192,57,43,0.4); animation: pulseBtn 2s infinite;
}
@keyframes pulseBtn { 0%,100% { box-shadow: 0 6px 20px rgba(192,57,43,0.4); } 50% { box-shadow: 0 6px 35px rgba(192,57,43,0.7); } }
.lottery-start-btn:active { transform: scale(0.95); }
.lottery-start-btn.disabled { opacity:0.5; pointer-events:none; animation:none; }

/* ============ Medicine Box Enhanced ============ */
.med-container { position: relative; width: 100%; display: flex; flex-direction: column; align-items: center; }
.med-box-wrap { position: relative; width: 180px; height: 140px; cursor: pointer; margin: 10px auto; }
.med-box-body {
  width: 100%; height: 100%; background: linear-gradient(180deg, #e8d5a3, #c9a96e);
  border: 3px solid #8b6914; border-radius: 12px; position: relative; overflow: hidden;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}
.med-box-cross { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 3.5rem; color: #c0392b; z-index: 1; }
.med-box-lid {
  width: 110%; height: 30px; background: linear-gradient(180deg, #d4a76a, #b8894a);
  border: 3px solid #8b6914; border-radius: 12px 12px 0 0; position: absolute; top: -15px; left: -5%;
  transform-origin: left center; transition: transform 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55); z-index: 2;
}
.med-box-wrap.open .med-box-lid { transform: rotate(-130deg) translateY(-25px); }
.med-box-wrap.shaking { animation: boxShake 0.5s ease-in-out; }
@keyframes boxShake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-8px) rotate(-2deg); } 50% { transform: translateX(8px) rotate(2deg); } 75% { transform: translateX(-5px) rotate(-1deg); } }
.med-notes-area { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 20px; opacity: 0; transform: translateY(20px); transition: all 0.5s; }
.med-notes-area.show { opacity: 1; transform: translateY(0); }
.med-note {
  background: var(--paper); padding: 10px 18px; border-radius: 4px; font-family: var(--font-hand);
  font-size: 0.9rem; box-shadow: 2px 2px 6px var(--shadow); border: 1px solid var(--paper-dark);
  transform: rotate(var(--rot, 0deg)); transition: all 0.2s; position: relative;
}
.med-note.picked { background: var(--accent-gold); color: #fff; transform: scale(1.15) rotate(0deg); z-index: 5; box-shadow: 0 0 25px rgba(212,160,23,0.6); }
.med-claw { position: absolute; font-size: 2rem; top: -60px; left: 50%; transform: translateX(-50%); z-index: 10; opacity: 0; transition: all 0.3s; pointer-events: none; }
.med-claw.active { opacity:1; animation: clawDown 0.6s ease-in forwards; }
@keyframes clawDown { 0% { top:-60px; } 60% { top:20px; } 80% { top:40px; } 100% { top:80px; opacity:0; } }

/* ============ Sushi Conveyor Enhanced ============ */
.sushi-container { width: 100%; position: relative; }
.sushi-conveyor {
  width: 100%; overflow: hidden; position: relative; height: 120px;
  background: var(--paper-dark); border-radius: 8px; margin: 10px 0;
}
.sushi-belt { display: flex; gap: 20px; padding: 10px; animation: beltScroll 3s linear infinite; white-space: nowrap; }
@keyframes beltScroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
.sushi-belt.paused { animation-play-state: paused; }
.sushi-plate {
  font-size: 2.5rem; cursor: pointer; transition: all 0.3s; flex-shrink: 0;
  animation: plateFloat 1.5s ease-in-out infinite; animation-delay: var(--delay, 0s);
}
@keyframes plateFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
.sushi-plate:active { transform: scale(1.3); }
.sushi-plate.chosen {
  animation: plateToCenter 0.8s ease-out forwards !important;
  z-index: 10; position: relative;
}
@keyframes plateToCenter {
  0% { transform: translateY(0) scale(1); }
  50% { transform: scale(1.5); }
  100% { transform: translateY(-40px) scale(2.5); filter: brightness(1.3); }
}
.sushi-reveal {
  display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  font-family: var(--font-hand); font-size: 1.6rem; color: var(--accent);
  background: var(--paper-light); padding: 16px 28px; border-radius: var(--radius);
  border: 3px solid var(--accent-gold); z-index: 20; text-align: center;
  animation: revealPop 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}
@keyframes revealPop { 0% { transform: translate(-50%,-50%) scale(0); } 100% { transform: translate(-50%,-50%) scale(1); } }

/* ============ Rider Enhanced ============ */
.rider-map {
  width: 100%; height: 240px; background: linear-gradient(180deg, #e8f5e9 0%, #c8e6c9 50%, #a5d6a7 100%);
  border-radius: var(--radius); position: relative; overflow: hidden; border: 2px solid #81c784;
}
.rider-map .road { position: absolute; background: #bdbdbd; border-radius: 2px; }
.rider-map .road.h { height: 6px; }
.rider-map .road.v { width: 6px; }
.rider-map .location-pin { position: absolute; font-size: 1.5rem; opacity:0.7; }
.rider-marker { position: absolute; font-size: 2rem; transition: all 0.3s linear; z-index: 2; }
.rider-urge-btn {
  display: block; margin: 20px auto; padding: 14px 36px; background: #ff9800; color: #fff;
  border: none; border-radius: 30px; font-family: var(--font-hand); font-size: 1.2rem;
  cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 12px rgba(255,152,0,0.4);
}
.rider-urge-btn:active { transform: scale(0.95); }
.rider-box-wrap { text-align: center; margin-top: 16px; cursor: pointer; }
.rider-box-icon { font-size: 4rem; animation: boxReveal 0.6s ease-out; display: inline-block; }
@keyframes boxReveal { from { opacity:0; transform: scale(0) rotate(-180deg); } to { opacity:1; transform: scale(1) rotate(0); } }
.rider-box-icon.opening { animation: boxOpen 0.6s ease-out forwards; }
@keyframes boxOpen {
  0% { transform: scale(1); }
  30% { transform: scale(1.15); }
  100% { transform: scale(2.5); opacity: 0; }
}
.dingdong-text { text-align: center; font-family: var(--font-hand); font-size: 1.2rem; color: var(--accent); margin-top: 8px; display: none; }

/* ============ Gacha Machine ============ */
.gacha-machine {
  width: 100%; max-width: 340px; position: relative; display: flex; flex-direction: column; align-items: center;
}
.gacha-body {
  width: 260px; height: 280px; background: linear-gradient(180deg, #ff9800 0%, #f57c00 30%, #e65100 100%);
  border-radius: 20px 20px 60px 60px; position: relative; overflow: visible;
  border: 4px solid #bf360c; box-shadow: 0 8px 30px rgba(0,0,0,0.3);
}
.gacha-glass {
  position: absolute; top: 20px; left: 20px; width: 220px; height: 160px;
  background: rgba(255,255,255,0.2); border-radius: 15px; overflow: hidden;
  border: 3px solid rgba(255,255,255,0.3);
}
.gacha-balls-container {
  position: absolute; top:0; left:0; width:100%; height:100%; overflow:hidden;
}
.gacha-inner-ball {
  position: absolute; width: 28px; height: 28px; border-radius: 50%;
  animation: ballTumble 2s ease-in-out infinite; animation-delay: var(--delay, 0s);
  box-shadow: inset -3px -3px 6px rgba(0,0,0,0.2);
}
.gacha-inner-ball::after {
  content: ''; position: absolute; top: 5px; left: 6px; width: 8px; height: 6px;
  background: rgba(255,255,255,0.5); border-radius: 50%;
}
@keyframes ballTumble {
  0%,100% { transform: translateY(0) rotate(0); }
  20% { transform: translateY(-20px) rotate(60deg); }
  40% { transform: translateY(5px) rotate(120deg); }
  60% { transform: translateY(-15px) rotate(200deg); }
  80% { transform: translateY(30px) rotate(300deg); }
}
.gacha-balls-container.tumbling .gacha-inner-ball { animation-duration: 0.4s; }
.gacha-exit {
  position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%);
  width: 50px; height: 30px; background: #bf360c; border-radius: 0 0 10px 10px;
  border: 3px solid #8d1b00; z-index: 5;
}
.gacha-crank {
  position: absolute; right: -40px; top: 80px; width: 50px; height: 50px;
  background: #555; border-radius: 50%; border: 3px solid #333; cursor: pointer;
  transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94); z-index: 10;
  display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
}
.gacha-crank.turning { transform: rotate(720deg); }
.gacha-base { width: 300px; height: 20px; background: #bf360c; border-radius: 0 0 10px 10px; margin-top: -10px; }
.gacha-dropped-ball {
  width: 60px; height: 60px; border-radius: 50%; margin-top: 20px; cursor: pointer;
  transition: all 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  animation: ballBounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); display: none;
  position: relative; font-size: 2rem; display: none; align-items: center; justify-content: center;
}
@keyframes ballBounceIn { 0% { transform: scale(0); } 60% { transform: scale(1.2); } 100% { transform: scale(1); } }
.gacha-dropped-ball.show { display: flex; }
.gacha-dropped-ball::after {
  content: ''; position: absolute; top: 10px; left: 40%; width: 15px; height: 10px;
  background: rgba(255,255,255,0.5); border-radius: 50%;
}
.gacha-dropped-ball.cracking {
  animation: eggCrack 0.8s ease-out forwards;
}
@keyframes eggCrack {
  0% { transform: scale(1); }
  30% { transform: scale(1.25) rotate(-5deg); }
  60% { transform: scale(1.3) rotate(5deg); }
  100% { transform: scale(0); opacity: 0; }
}
.gacha-reveal-text {
  display: none; font-family: var(--font-hand); font-size: 1.5rem; color: var(--accent);
  background: var(--paper-light); padding: 16px 24px; border-radius: var(--radius);
  border: 3px solid var(--accent-gold); text-align: center;
  animation: revealPop 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  box-shadow: 0 10px 30px rgba(0,0,0,0.3); margin-top: 20px;
}

/* ============ Fate Reveal Overlay ============ */
.fate-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.75); z-index: 2000; align-items: center; justify-content: center;
}
.fate-overlay.active { display: flex; }
.fate-card {
  background: var(--paper); border-radius: 20px; padding: 30px 24px; max-width: 360px;
  width: 90%; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  border: 4px solid var(--accent-gold); animation: fateIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  position: relative; overflow: hidden;
}
@keyframes fateIn { 0% { transform: scale(0) rotate(-10deg); opacity:0; } 100% { transform: scale(1) rotate(0); opacity:1; } }
.fate-card::before {
  content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
  background: radial-gradient(ellipse, rgba(255,215,0,0.15) 0%, transparent 60%);
  animation: fateGlow 2s ease-in-out infinite;
}
@keyframes fateGlow { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
.fate-icon { font-size: 4rem; display: block; margin-bottom: 8px; }
.fate-label {
  font-family: var(--font-hand); font-size: 1rem; color: var(--accent-gold); margin-bottom: 8px;
  letter-spacing: 2px;
}
.fate-food {
  font-family: var(--font-hand); font-size: 2rem; color: var(--accent); padding: 16px;
  background: var(--paper-light); border-radius: 12px; border: 2px dashed var(--accent-gold);
  margin: 12px 0; position: relative; z-index: 1;
}
.fate-sparkles { position: absolute; pointer-events: none; z-index: 0; }
.fate-rare-badge {
  display: inline-block; background: linear-gradient(135deg, #ffd700, #ffaa00); color: #fff;
  padding: 4px 14px; border-radius: 15px; font-family: var(--font-hand); font-size: 0.85rem;
}
.fate-ssr { font-size: 1.5rem; color: #e91e63; padding: 20px; background: linear-gradient(135deg, #fff9c4, #ffecb3); border-radius: 12px; border: 3px solid var(--accent-gold); animation: ssrGlow 1s ease-in-out infinite alternate; }
@keyframes ssrGlow { from { box-shadow: 0 0 10px var(--accent-gold); } to { box-shadow: 0 0 30px var(--accent-gold), 0 0 60px #ff9800; } }
.fate-lobster { font-size: 1.2rem; font-family: var(--font-hand); color: var(--ink); margin: 8px 0; }
.fate-lobster-btn {
  display: inline-block; padding: 12px 28px; background: linear-gradient(135deg, #ff9800, #f57c00); color: #fff;
  border: none; border-radius: 25px; font-family: var(--font-hand); font-size: 1.1rem; cursor: pointer;
  margin-top: 8px; transition: all 0.2s;
}
.fate-lobster-btn:active { transform: scale(0.95); }

/* ============ Modals ============ */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.active { display: flex; }
.modal-box {
  background: var(--paper); border-radius: var(--radius); padding: 24px 20px; max-width: 380px;
  width: 100%; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  animation: modalIn 0.3s ease-out; border: 3px solid var(--paper-dark); position: relative;
}
@keyframes modalIn { from { opacity:0; transform: scale(0.8) translateY(20px); } to { opacity:1; transform: scale(1) translateY(0); } }
.modal-box h3 { font-family: var(--font-hand); font-size: 1.4rem; margin-bottom: 12px; color: var(--ink); }
.modal-btns { display: flex; gap: 12px; justify-content: center; margin-top: 16px; flex-wrap: wrap; }
.modal-btn { padding: 12px 24px; border-radius: 25px; font-family: var(--font-hand); font-size: 1rem; border: none; cursor: pointer; transition: all 0.2s; }
.modal-btn:active { transform: scale(0.95); }
.modal-btn.primary { background: var(--accent); color: #fff; }
.modal-btn.secondary { background: var(--paper-dark); color: var(--ink); border: 2px solid var(--wood-light); }
.modal-btn.gold { background: linear-gradient(135deg, #ff9800, #f57c00); color: #fff; }
.oracle-content { font-family: var(--font-hand); font-size: 1.3rem; padding: 20px; background: linear-gradient(135deg, #e8f5e9, #f1f8e9); border-radius: 8px; margin: 12px 0; }

  try { const raw = localStorage.getItem('eats_' + key); return raw ? JSON.parse(raw) : defaultValue; }

}
function saveData(key, value) {

}

function navigateTo(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));

  if (!target) return;
  target.classList.add('active');
  AppState.currentPage = page;
  window.scrollTo({ top: 0, behavior: 'smooth' });
  if (page === 'archive') renderArchive();
  if (page === 'edit') renderEdit();
  if (page === 'achievements') renderAchievements();
  if (page === 'home') renderHome();
  if (AppState.riderInterval) { clearInterval(AppState.riderInterval); AppState.riderInterval = null; }
  if (page.startsWith('lottery-')) {
    AppState.currentCategory = page.replace('lottery-', '');
    AppState.lotteryActive = false;
    initLotteryPage(AppState.currentCategory);
  }
  closeAllModals();

      <span class="cat-name">${cat.name}</span>
      ${cat.type ? `<span class="cat-tag">${getTypeLabel(cat.type)}</span>` : ''}

  updateDailyPowerBtn();

}

// ==================== LOTTERY ENGINE ====================
function draw(categoryId, pangpangBoosted = false) {
  const cat = PersistData.categories.find(c => c.id === categoryId);
  if (!cat) return null;
  if (Math.random() < SSR_RATE) return { type: 'ssr', content: SSR_CONTENT, category: categoryId };
  if (!pangpangBoosted && Math.random() < PANGPANG_RATE && categoryId !== 'ulcer') return { type: 'pangpang', category: categoryId };

  let oracleBoost = null;
  if (PersistData.oracle && PersistData.oracleDate === new Date().toLocaleDateString('zh-CN')) oracleBoost = PersistData.oracle.keywords || [];

  if (cat.menus.special && cat.menus.special.length > 0 && Math.random() < (cat.specialRate || 0.05)) {
    const item = cat.menus.special[Math.floor(Math.random() * cat.menus.special.length)];
    return processResult({ type: 'special', content: item, category: categoryId });
  }
  if (cat.menus.rare && cat.menus.rare.length > 0 && Math.random() < (cat.rareRate || 0.05)) {
    const item = cat.menus.rare[Math.floor(Math.random() * cat.menus.rare.length)];
    return processResult({ type: 'rare', content: item, category: categoryId });
  }

  let items = [...(cat.menus.normal || [])];
  let weights = items.map(() => 1);
  if (pangpangBoosted) items.forEach((item, i) => { if (DEFAULT_PANGPANG_FAVORITES.some(f => item.includes(f))) weights[i] = 5; });
  if (oracleBoost) items.forEach((item, i) => { if (oracleBoost.some(kw => item.includes(kw))) weights[i] = (weights[i] || 1) * 3; });

  const total = weights.reduce((a, b) => a + b, 0);
  let rand = Math.random() * total, selected = items[0];
  for (let i = 0; i < items.length; i++) { rand -= weights[i]; if (rand <= 0) { selected = items[i]; break; } }
  return processResult({ type: 'normal', content: selected, category: categoryId });
}

function processResult(result) {
  if (result.content && result.content.includes('小龙虾')) return { ...result, lobsterRedraw: true };
  if (result.content === 'omakase') return { ...result, omakase: true };
  if (result.content === '去钓虾吧') return { ...result, fishing: true };
  return result;
}

// ==================== AUTO RECORD ====================
function autoRecord(result) {
  const now = new Date();
  const record = {
    date: now.toLocaleDateString('zh-CN'),
    time: now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }),
    category: result.category,
    food: result.content,
    type: result.type || 'normal',
  };
  PersistData.history.unshift(record);
  PersistData.foodCounts[result.content] = (PersistData.foodCounts[result.content] || 0) + 1;
  PersistData.categoryCounts[result.category] = (PersistData.categoryCounts[result.category] || 0) + 1;
  PersistData.consecutiveNoReroll = (PersistData.consecutiveNoReroll || 0) + 1;
  if (result.type === 'ssr') PersistData.ssrCount = (PersistData.ssrCount || 0) + 1;
  checkAchievements();
  saveAllMeta();
}

// ==================== FATE REVEAL ====================
function showFateReveal(result) {
  const card = document.getElementById('fate-card');
  let badge = '';
  if (result.type === 'rare') badge = '<span class="fate-rare-badge">✨ 稀有菜单</span><br>';
  if (result.type === 'special') badge = '<span style="color:var(--accent-gold);font-family:var(--font-hand);">🌟 特殊菜单</span><br>';
  if (result.omakase) badge = '<span style="color:var(--accent-gold);font-family:var(--font-hand);font-size:1.2rem;">🍣 OMAKASE 🍣</span><br>';
  if (result.fishing) badge = '<span style="color:var(--accent-gold);font-family:var(--font-hand);font-size:1.2rem;">🎣 去钓虾吧！</span><br>';

  let foodHtml = `<div class="fate-food">${escapeHtml(result.content)}</div>`;

  // SSR special case
  if (result.type === 'ssr') {
    foodHtml = `<div class="fate-ssr">${escapeHtml(result.content)}</div>`;
  }

  // Lobster redraw case
  let lobsterHtml = '';
  if (result.lobsterRedraw) {
    lobsterHtml = `
      <div class="fate-lobster">🦞 小龙虾小龙虾~<br>抽到此选项可以再抽一次！</div>
      <button class="fate-lobster-btn" onclick="doLobsterRedraw()">再抽一次 🦞</button>
    `;
    foodHtml = ''; // don't show the food yet
  }

  card.innerHTML = `
    <span class="fate-icon">✨</span>
    <div class="fate-label">✨ 今日命运 ✨</div>
    ${badge}
    ${foodHtml}
    ${lobsterHtml}
  `;
  document.getElementById('fate-overlay').classList.add('active');

  // Auto-close after 2s unless lobster redraw
  if (!result.lobsterRedraw) {
    setTimeout(() => {
      document.getElementById('fate-overlay').classList.remove('active');
      renderHome();
      navigateTo('home');
    }, 2500);
  }
}

function doLobsterRedraw() {
  document.getElementById('fate-overlay').classList.remove('active');
  const catId = AppState.currentCategory;
  let result = draw(catId);
  let attempts = 0;
  while (result && result.lobsterRedraw && attempts < 10) { result = draw(catId); attempts++; }
  if (result.type === 'pangpang') { showPangpangModal(catId); return; }
  deliverResult(result);
}

function deliverResult(result) {
  autoRecord(result);
  showFateReveal(result);
}

function checkAchievements() {
  const state = { foodCounts: PersistData.foodCounts, categoryCounts: PersistData.categoryCounts, consecutiveNoReroll: PersistData.consecutiveNoReroll, ssrCount: PersistData.ssrCount };
  ACHIEVEMENTS.forEach(a => {
    if (!PersistData.achievements.includes(a.id) && a.check(state)) {
      PersistData.achievements.push(a.id);
      setTimeout(() => showAchievementUnlock(a), 500);
    }
  });
  saveAllMeta();
}
function showAchievementUnlock(a) {
  const div = document.createElement('div');
  div.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#ffd700,#ffaa00);color:#fff;padding:16px 24px;border-radius:20px;font-family:var(--font-hand);font-size:1.1rem;z-index:10000;box-shadow:0 4px 20px rgba(255,170,0,0.5);animation:modalIn 0.4s ease-out;';
  div.innerHTML = `🏆 成就解锁：${a.name}<br><span style="font-size:0.8rem;">${a.desc}</span>`;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 3000);
}

// ==================== EDIT ====================
function renderEdit() {
  const cats = PersistData.categories;
  document.getElementById('edit-content').innerHTML = cats.map((cat, ci) => `
    <div class="edit-section">
      <h4>${cat.icon} ${cat.name} <button class="top-btn" onclick="deleteCategory(${ci})" style="background:var(--accent);">删除</button></h4>
      <div style="margin-bottom:8px;">
        <label style="font-size:0.8rem;">名称：</label><input value="${escapeHtml(cat.name)}" onchange="updateCatName(${ci},this.value)" style="width:100%;padding:6px;border:1px solid var(--paper-dark);border-radius:4px;font-family:var(--font-body);margin-bottom:6px;" />
        <label style="font-size:0.8rem;">图标：</label><input value="${cat.icon}" onchange="updateCatIcon(${ci},this.value)" style="width:100%;padding:6px;border:1px solid var(--paper-dark);border-radius:4px;margin-bottom:6px;" />
        <label style="font-size:0.8rem;">稀有概率：</label><input type="number" value="${cat.rareRate||0}" step="0.01" min="0" max="1" onchange="updateCatRareRate(${ci},parseFloat(this.value))" style="width:100%;padding:6px;border:1px solid var(--paper-dark);border-radius:4px;margin-bottom:6px;" />
        ${cat.specialRate!==undefined?`<label style="font-size:0.8rem;">特殊概率：</label><input type="number" value="${cat.specialRate||0}" step="0.01" min="0" max="1" onchange="updateCatSpecialRate(${ci},parseFloat(this.value))" style="width:100%;padding:6px;border:1px solid var(--paper-dark);border-radius:4px;margin-bottom:6px;" />`:''}
      </div>
      ${renderMenuEdit(cat,ci,'normal','普通菜单')}
      ${cat.menus.rare?renderMenuEdit(cat,ci,'rare','稀有菜单 (5%)'):''}
      ${cat.menus.special?renderMenuEdit(cat,ci,'special','特殊菜单 (5%)'):''}
      <button class="top-btn" onclick="addMenuType(${ci})" style="font-size:0.75rem;margin-top:8px;">+ 添加菜单类型</button>
    </div>
  `).join('') + `
    <div class="edit-section" style="text-align:center;">
      <h4>新增分类</h4>
      <div class="edit-add-form"><input id="new-cat-name" placeholder="分类名称" /><input id="new-cat-icon" placeholder="图标" style="width:60px;" /><button onclick="addCategory()">新增</button></div>
    </div>
  `;
}
function renderMenuEdit(cat, ci, type, label) {
  const menus = cat.menus[type] || [];
  return `<div style="margin-bottom:8px;"><strong style="font-size:0.85rem;">${label}：</strong><ul class="edit-menu-list">${menus.map((m,mi)=>`<li><span>${m}</span><div><button onclick="editMenuItem(${ci},'${type}',${mi})" title="编辑">✏️</button><button onclick="deleteMenuItem(${ci},'${type}',${mi})" title="删除">🗑️</button></div></li>`).join('')}</ul><div class="edit-add-form"><input id="add-input-${ci}-${type}" placeholder="新增菜单项" /><button onclick="addMenuItem(${ci},'${type}')">+ 添加</button></div></div>`;
}
function updateCatName(ci, v) { PersistData.categories[ci].name = v; saveCategories(); }
function updateCatIcon(ci, v) { PersistData.categories[ci].icon = v; saveCategories(); }
function updateCatRareRate(ci, v) { PersistData.categories[ci].rareRate = Math.max(0, Math.min(1, v || 0)); saveCategories(); }
function updateCatSpecialRate(ci, v) { PersistData.categories[ci].specialRate = Math.max(0, Math.min(1, v || 0)); saveCategories(); }
function addMenuItem(ci, type) {
  const input = document.getElementById('add-input-' + ci + '-' + type);
  if (!input || !input.value.trim()) return;
  if (!PersistData.categories[ci].menus[type]) PersistData.categories[ci].menus[type] = [];
  PersistData.categories[ci].menus[type].push(input.value.trim()); input.value = '';
  saveCategories(); renderEdit();
}
function deleteMenuItem(ci, type, mi) { PersistData.categories[ci].menus[type].splice(mi, 1); saveCategories(); renderEdit(); }
function editMenuItem(ci, type, mi) {
  const v = prompt('编辑菜单项：', PersistData.categories[ci].menus[type][mi]);
  if (v !== null && v.trim()) { PersistData.categories[ci].menus[type][mi] = v.trim(); saveCategories(); renderEdit(); }
}
function addMenuType(ci) {
  const tn = prompt('新菜单类型名称（如 rare, special, breakfast）：');
  if (tn && tn.trim()) { PersistData.categories[ci].menus[tn.trim()] = []; saveCategories(); renderEdit(); }
}
function addCategory() {
  const name = document.getElementById('new-cat-name').value.trim();
  const icon = document.getElementById('new-cat-icon').value.trim() || '🍽️';
  if (!name) return;
  PersistData.categories.push({ id: 'custom_' + Date.now(), name, icon, type: 'medicine_box', menus: { normal: [] }, tips: [], rareRate: 0, specialRate: 0 });
  document.getElementById('new-cat-name').value = ''; document.getElementById('new-cat-icon').value = '';
  saveCategories(); renderEdit(); renderHome();
}
function deleteCategory(ci) {
  if (PersistData.categories.length <= 1) { alert('至少保留一个分类！'); return; }
  if (confirm('确定删除分类 "' + PersistData.categories[ci].name + '" 吗？')) { PersistData.categories.splice(ci, 1); saveCategories(); renderEdit(); renderHome(); }
}

// ==================== MUSIC ====================
let audioCtx = null, musicGain = null, musicOscillators = [];
function initAudio() {
  if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); musicGain = audioCtx.createGain(); musicGain.gain.value = PersistData.musicVol * 0.15; musicGain.connect(audioCtx.destination); }
}
function startMusic() {
  initAudio(); if (musicOscillators.length > 0) return;
  const notes = [262, 330, 392, 440, 523, 660, 784];
  notes.forEach((freq, i) => {
    const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
    osc.type = 'sine'; osc.frequency.value = freq;
    gain.gain.value = 0.03 + Math.random() * 0.02;
    osc.connect(gain); gain.connect(musicGain); osc.start();
    musicOscillators.push({ osc, gain });
    setTimeout(() => { osc.frequency.value = freq * (1 + Math.sin(Date.now() / 5000 + i) * 0.02); }, 1000);
  });
  const mod = setInterval(() => {
    if (musicOscillators.length === 0) { clearInterval(mod); return; }
    musicOscillators.forEach((o, i) => { o.osc.frequency.value = notes[i] * (1 + Math.sin(Date.now() / 3000 + i) * 0.03); });
  }, 2000);
  PersistData.musicOn = true; saveAllMeta(); updateMusicBtn();
}
function stopMusic() {
  musicOscillators.forEach(o => { try { o.osc.stop(); } catch (e) {} }); musicOscillators = [];
  PersistData.musicOn = false; saveAllMeta(); updateMusicBtn();
}
function toggleMusic() { PersistData.musicOn ? stopMusic() : startMusic(); }
function updateMusicBtn() {
  const btn = document.getElementById('btn-music');
  if (btn) { btn.textContent = PersistData.musicOn ? '🎵 音乐:开' : '🎵 音乐'; if (PersistData.musicOn) btn.classList.add('music-on'); else btn.classList.remove('music-on'); }
}

// ==================== FLOATING TEXTS ====================
function startFloatingTexts() {
  if (AppState.floatingTextTimer) return;
  spawnFloatingText();
  AppState.floatingTextTimer = setInterval(spawnFloatingText, 3000);
}
function spawnFloatingText() {
  const text = FLOATING_TEXTS[Math.floor(Math.random() * FLOATING_TEXTS.length)];
  const el = document.createElement('div');
  el.className = 'floating-text'; el.textContent = text;
  el.style.top = (5 + Math.random() * 80) + '%'; el.style.left = '-50px';
  el.style.animationDuration = (5 + Math.random() * 5) + 's';
  el.style.fontSize = (0.8 + Math.random() * 0.6) + 'rem';
  document.getElementById('floating-layer').appendChild(el);
  setTimeout(() => el.remove(), 7000);
}

// ==================== EASTER EGG ====================
let titleClickTimer = null;
function initTitleEasterEgg() {
  const title = document.getElementById('main-title'); if (!title) return;
  title.addEventListener('click', () => {
    AppState.titleClickCount++;
    if (titleClickTimer) clearTimeout(titleClickTimer);
    titleClickTimer = setTimeout(() => { AppState.titleClickCount = 0; }, 2000);
    if (AppState.titleClickCount >= 10) {
      AppState.titleClickCount = 0; if (titleClickTimer) clearTimeout(titleClickTimer);
      alert('别点了！快去吃饭！！！');
      const rc = PersistData.categories[Math.floor(Math.random() * PersistData.categories.length)];
      navigateTo('lottery-' + rc.id);
    }
  });
}

// ==================== UTILS ====================
function escapeHtml(str) {
  const div = document.createElement('div'); div.textContent = str; return div.innerHTML;
}

// ==================== INIT ====================
function init() {
  if (PersistData.musicOn) updateMusicBtn();
  const today = new Date().toLocaleDateString('zh-CN');
  if (PersistData.dailyPowerDate !== today) AppState.dailyPowerUsed = false;
  if (PersistData.oracle && PersistData.oracleDate === today) AppState.oracleToday = PersistData.oracle;
  renderHome(); updateMusicBtn(); updateDailyPowerBtn();
  startFloatingTexts(); initTitleEasterEgg();
  document.querySelectorAll('.modal-overlay').forEach(o => {
    o.addEventListener('click', function(e) { if (e.target === this) this.classList.remove('active'); });
  });
  document.getElementById('fate-overlay').addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('active');
  });
}

document.addEventListener('DOMContentLoaded', init);
document.addEventListener('visibilitychange', () => {
  if (document.hidden) { if (AppState.floatingTextTimer) { clearInterval(AppState.floatingTextTimer); AppState.floatingTextTimer = null; } }
  else startFloatingTexts();
});
